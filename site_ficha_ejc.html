<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Ficha Cadastral - EJC</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="shortcut icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        #loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a2d4d 0%, #1a5276 50%, #2e86c1 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        #loading.hide { opacity: 0; pointer-events: none; }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 20px; font-size: 18px; font-weight: 500; }

        .back-button {
            position: fixed;
            top: 20px; left: 20px;
            z-index: 1000;
            background: white;
            color: #1a5276;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            background: #1a5276;
            color: white;
        }

        #appFrame {
            width: 100%; height: 100%;
            border: none;
            display: block;
            -webkit-overflow-scrolling: touch;
            overflow: auto;
        }

        .lgpd-banner {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 10000;
            background: rgba(26, 45, 77, 0.97);
            backdrop-filter: blur(10px);
            color: white;
            padding: 20px;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.4s ease;
        }
        .lgpd-banner.show { display: block; }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .lgpd-content {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .lgpd-text { flex: 1; min-width: 250px; font-size: 0.9rem; line-height: 1.5; }
        .lgpd-buttons { display: flex; gap: 10px; flex-shrink: 0; }

        .lgpd-btn {
            padding: 10px 24px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }
        .lgpd-btn-accept { background: white; color: #1a2d4d; }
        .lgpd-btn-accept:hover { background: #eaf2f8; transform: translateY(-1px); }
        .lgpd-btn-reject { background: transparent; color: white; border: 2px solid rgba(255,255,255,0.5); }
        .lgpd-btn-reject:hover { border-color: white; background: rgba(255,255,255,0.1); }

        @media (max-width: 768px) {
            body, html { overflow: auto; -webkit-overflow-scrolling: touch; }
            #appFrame { pointer-events: auto; touch-action: pan-y; }
            .lgpd-content { flex-direction: column; text-align: center; }
            .lgpd-buttons { justify-content: center; width: 100%; }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Carregando Ficha Cadastral...</div>
    </div>

    <a href="index.html" class="back-button">← Voltar ao Menu</a>

    <iframe
        id="appFrame"
        src="https://script.google.com/macros/s/AKfycbwo8jU4yLGuVVFhZT8aM0Ga3QwSwSEyyXprVGkZH22z9k8aMwjtggSPQrIQzt9lQayZ/exec?page=ejc"
        title="Ficha Cadastral - EJC"
        allowfullscreen
        loading="eager"
        allow="geolocation; camera *; microphone *"
    ></iframe>

    <div class="lgpd-banner" id="lgpdBanner">
        <div class="lgpd-content">
            <div class="lgpd-text">
                🍪 Este site utiliza cookies para análise de uso e melhorias.
                Seus dados não são compartilhados com terceiros.
            </div>
            <div class="lgpd-buttons">
                <button class="lgpd-btn lgpd-btn-accept" id="lgpdAccept">Aceitar</button>
                <button class="lgpd-btn lgpd-btn-reject" id="lgpdReject">Recusar</button>
            </div>
        </div>
    </div>

    <script>
        var iframe = document.getElementById('appFrame');
        var loading = document.getElementById('loading');

        iframe.addEventListener('load', function() {
            setTimeout(function() { loading.classList.add('hide'); }, 500);
        });
        setTimeout(function() {
            if (!loading.classList.contains('hide')) loading.classList.add('hide');
        }, 10000);

        var GA_ID = 'G-XXXXXXXXXX'; // TODO: substituir pelo ID do GA do EJC
        var LGPD_KEY = 'ejc_lgpd_consent';

        function getConsent() { try { return localStorage.getItem(LGPD_KEY); } catch(e) { return null; } }
        function setConsent(v) { try { localStorage.setItem(LGPD_KEY, v); } catch(e) {} }

        function loadGA() {
            if (document.querySelector('script[src*="googletagmanager"]')) return;
            var s = document.createElement('script'); s.async = true;
            s.src = 'https://www.googletagmanager.com/gtag/js?id=' + GA_ID;
            document.head.appendChild(s);
            window.dataLayer = window.dataLayer || [];
            function gtag() { window.dataLayer.push(arguments); }
            window.gtag = gtag; gtag('js', new Date()); gtag('config', GA_ID);
        }

        function removeGACookies() {
            ['_ga','_gid','_gat'].forEach(function(n) {
                document.cookie = n+'=;expires=Thu,01 Jan 1970 00:00:00 UTC;path=/;';
                document.cookie = n+'=;expires=Thu,01 Jan 1970 00:00:00 UTC;path=/;domain=.'+location.hostname;
            });
        }

        var consent = getConsent();
        if (consent === 'accepted') loadGA();
        else if (consent === null) setTimeout(function() { document.getElementById('lgpdBanner').classList.add('show'); }, 1000);

        document.getElementById('lgpdAccept').addEventListener('click', function() {
            setConsent('accepted'); loadGA(); document.getElementById('lgpdBanner').classList.remove('show');
        });
        document.getElementById('lgpdReject').addEventListener('click', function() {
            setConsent('rejected'); removeGACookies(); document.getElementById('lgpdBanner').classList.remove('show');
        });
    </script>
</body>
</html>
